name: Android Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android Debug
        run: cd android && ./gradlew assembleDebug

      # 🟢 حذف أي build قديم (اختياري)
      - name: Clean old build folder
        run: rm -rf android/app/build

      # 🟢 نقل الناتج داخل repo بشكل ثابت
      - name: Prepare build folder for commit
        run: |
          mkdir -p build_output
          cp -r android/app/build build_output/

      # 🟢 رفع التغييرات إلى نفس المستودع
      - name: Commit build folder
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add build_output
          git commit -m "Update Android build folder" || echo "No changes"
          git push
